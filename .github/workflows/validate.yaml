name: Validate

on:
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'k8s-manifests/**'
      - 'helm-charts/**'
      - 'argocd-bootstrap/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform Init (no backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Check tfvars consistency
        run: |
          for env in dev staging prod; do
            echo "Checking environments/$env.tfvars..."
            terraform validate -var-file="environments/$env.tfvars" || true
          done

  kubernetes-validate:
    name: Kubernetes Manifests Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Dry-run Kubernetes manifests
        run: |
          for manifest in k8s-manifests/*.yaml; do
            echo "Validating $manifest ..."
            kubectl apply --dry-run=client -f "$manifest"
          done

  helm-validate:
    name: Helm Chart Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.13.0'

      - name: Add Helm Repos
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Lint Prometheus chart
        run: helm lint helm-charts/prometheus

      - name: Lint Grafana chart
        run: helm lint helm-charts/grafana
